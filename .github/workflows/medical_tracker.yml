name: 医药板块每日监控 + 推送

on:
  schedule:
    - cron: '45 6 * * 1-5'
  workflow_dispatch:

jobs:
  daily-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install pandas numpy scipy akshare openpyxl

      - name: Run monitor + push
        id: monitor
        env:
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python app/notify.py 2>&1 | tee output.txt
          # 从 output.txt 提取 alert level (SILENT/YELLOW/RED)
          ALERT=$(grep '^\s*\[.*\]' output.txt | head -1 | sed 's/.*\[//;s/\].*//' | tr '[:upper:]' '[:lower:]')
          echo "alert=${ALERT:-silent}" >> $GITHUB_OUTPUT
          SCORE=$(grep -o 'Score: [0-9]' output.txt | head -1 | grep -o '[0-9]')
          echo "score=${SCORE:-0}" >> $GITHUB_OUTPUT
          echo "alert=${ALERT:-silent}, score=${SCORE:-0}"

      - name: Generate dashboard
        run: python app/dashboard.py

      - name: Save results
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add dashboard.html data/processed/signal_history.csv 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "[auto] $(date +%Y-%m-%d) alert:${{ steps.monitor.outputs.alert }} score:${{ steps.monitor.outputs.score }}"
            git push
          fi

      - name: Create Issue on RED alert
        if: steps.monitor.outputs.alert == 'red'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('output.txt', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ARMED! 医药板块 Score=${{ steps.monitor.outputs.score }} (${date})`,
              body: '```\n' + output + '\n```\n\n历史上 Armed 信号13周期望收益 +8.4%',
              labels: ['armed', 'alert']
            });
