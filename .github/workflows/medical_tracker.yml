name: 医药板块每日监控 + 推送

on:
  schedule:
    - cron: '45 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  daily-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install pandas numpy scipy akshare openpyxl

      - name: Run monitor
        id: monitor
        env:
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: |
          python app/notify.py 2>&1 | tee output.txt || true
          python app/ci_parse.py

      - name: Load parsed values
        id: parsed
        run: |
          cat alert_result.txt >> $GITHUB_OUTPUT

      - name: Generate dashboard
        run: python app/dashboard.py || true

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add dashboard.html data/processed/signal_history.csv 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" || (git commit -m "[auto] $(date +%Y-%m-%d) alert:${{ steps.parsed.outputs.alert }}" && git push || true)

      - name: Create Issue (RED only)
        if: steps.parsed.outputs.alert == 'red'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.existsSync('output.txt') ? fs.readFileSync('output.txt', 'utf8').slice(0, 4000) : '';
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ARMED! 医药板块 Score=${{ steps.parsed.outputs.score }} (${date})`,
              body: '```\n' + output + '\n```\n\n历史 Armed 信号 13周期望收益 +8.4%',
              labels: ['armed', 'alert']
            });
