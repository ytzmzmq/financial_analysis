name: 医药板块底部探测器 — 每周五自动运行

on:
  schedule:
    # 每周五 15:30 UTC+8 = 07:30 UTC
    - cron: '30 7 * * 5'
  workflow_dispatch:  # 允许手动触发

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib scipy akshare yfinance pandas-datareader openpyxl

      - name: Run tracker
        run: |
          python app/tracker.py 2>&1 | tee output.txt

      - name: Upload signal log
        uses: actions/upload-artifact@v4
        with:
          name: weekly-signal
          path: |
            output.txt
            data/processed/signal_history.csv
          retention-days: 90

      - name: Commit signal history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/signal_history.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[auto] weekly signal update $(date +%Y-%m-%d)"
            git push
          fi
